# EC2 Production Docker Compose
# Usage: docker compose -f docker-compose.ec2.yml up -d
#
# Required env vars (set in a .env file or export before running):
#   HOST              - EC2 public IP or domain (e.g. 13.233.12.45 or yourdomain.com)
#   JWT_SECRET        - Strong random secret for user JWTs
#   ADMIN_JWT_SECRET  - Strong random secret for admin JWTs
#   ENCRYPTION_KEY    - Fernet encryption key (generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
#   VITE_ENCRYPTION_KEY - Same key used by the frontend builds
#   ADMIN_EMAIL       - Initial admin account email
#   ADMIN_PASSWORD    - Initial admin account password

services:

  # ─────────────────────────── DATABASE ─────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sahayak_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sahayak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # DB port intentionally NOT exposed to host in production

  # ─────────────────────────── LLM MICROSERVICE ─────────────────────────────
  llm:
    image: ghcr.io/rithikzz/sahayak-llm:latest
    build:
      context: ./microservices/llm
      dockerfile: Dockerfile
    container_name: sahayak_llm
    environment:
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK}
      - AWS_REGION=${AWS_REGION:-eu-north-1}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-openai.gpt-oss-20b-1:0}
      - LLM_TIMEOUT=25
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s   # extra time for model pull on first boot
    restart: unless-stopped

  # ─────────────────────────── STT MICROSERVICE ─────────────────────────────
  stt:
    image: ghcr.io/rithikzz/sahayak-stt:latest
    build:
      context: ./microservices/stt
      dockerfile: Dockerfile
    container_name: sahayak_stt
    volumes:
      - whisper_cache:/root/.cache/whisper   # avoids re-downloading Whisper on restart
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────── TTS MICROSERVICE ─────────────────────────────
  tts:
    image: ghcr.io/rithikzz/sahayak-tts:latest
    build:
      context: ./microservices/tts
      dockerfile: Dockerfile
    container_name: sahayak_tts
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────── OCR MICROSERVICE ─────────────────────────────
  ocr:
    image: ghcr.io/rithikzz/sahayak-ocr:latest
    build:
      context: ./microservices/ocr
      dockerfile: Dockerfile
    container_name: sahayak_ocr
    environment:
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK}
      - AWS_REGION=${AWS_REGION:-eu-north-1}
      - VISION_MODEL_ID=${VISION_MODEL_ID:-mistral.pixtral-large-2502-v1:0}
      - VISION_TIMEOUT=60
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────── BACKEND ──────────────────────────────────────
  backend:
    image: ghcr.io/rithikzz/sahayak-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sahayak_backend
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=sahayak
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sahayak.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - ALLOWED_ORIGINS=http://${HOST},http://${HOST}:80,http://${HOST}:8080
      - STT_SERVICE_URL=http://stt:8001
      - TTS_SERVICE_URL=http://tts:8002
      - OCR_SERVICE_URL=http://ocr:8003
      - LLM_SERVICE_URL=http://llm:8004   # llm is now on the shared network
    volumes:
      - pdf_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      llm:
        condition: service_healthy
      stt:
        condition: service_started
      tts:
        condition: service_started
      ocr:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    # Backend port intentionally NOT exposed to host; Nginx proxies it

  # ─────────────────────────── KIOSK FRONTEND ───────────────────────────────
  frontend:
    image: ghcr.io/rithikzz/sahayak-frontend:latest
    build:
      context: ./kiosk
      dockerfile: Dockerfile
      args:
        VITE_ENCRYPTION_KEY: ${VITE_ENCRYPTION_KEY}
    container_name: sahayak_frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────── ADMIN FRONTEND ───────────────────────────────
  admin:
    image: ghcr.io/rithikzz/sahayak-admin:latest
    build:
      context: ./Sahayak_admin
      dockerfile: Dockerfile
      args:
        VITE_ENCRYPTION_KEY: ${VITE_ENCRYPTION_KEY}
    container_name: sahayak_admin
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────── NGINX REVERSE PROXY ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: sahayak_nginx
    ports:
      - "80:80"     # kiosk frontend
      - "8080:8080" # admin frontend
      - "5000:5000" # backend API (accessible from kiosk/admin via EC2 IP)
    volumes:
      - ./nginx/ec2.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - admin
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  pdf_data:
  whisper_cache:   # persists Whisper base model (~145 MB)
